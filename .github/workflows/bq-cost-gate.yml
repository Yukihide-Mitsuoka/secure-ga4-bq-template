# Pull-request BigQuery dry-run gate. Compilation runs in the reusable workflow's
# credential-free job; only isolated regular SQL files reach the WIF-authenticated job.
name: BQ Cost Gate

on:
  pull_request:

permissions:
  contents: read
  id-token: write

concurrency:
  group: bq-cost-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cost-gate:
    if: vars.BQ_COST_GATE_ENABLED == 'true'
    uses: Yukihide-Mitsuoka/gcp-cicd-workflows/.github/workflows/bq-cost-gate.yml@v2.0.1
    with:
      sql_glob: ${{ vars.BQ_COST_GATE_SQL_GLOB }}
      compile_command: ${{ vars.BQ_COST_GATE_COMPILE_COMMAND }}
      project_id: ${{ vars.GCP_PROJECT_ID }}
      wif_provider: ${{ vars.COST_GATE_WIF_PROVIDER }}
      service_account: ${{ vars.COST_GATE_SA }}
      default_max_bytes: ${{ vars.BQ_COST_GATE_DEFAULT_MAX_BYTES || '100000000000' }}
      budgets_file: ${{ vars.BQ_COST_GATE_BUDGETS_FILE }}
