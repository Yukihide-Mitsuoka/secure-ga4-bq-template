# Release automation (REL-001/010/020): release-please derives SemVer + changelog from
# Conventional Commits; on tag, gates run and SBOM is attached to the GitHub Release.
name: Release

on:
  push:
    branches: [main]
  # Re-evaluate accumulated history after a template owner enables release automation.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          # TEMPLATE: set release-type (node, python, go, rust, simple, ...)
          release-type: simple

  release-gates:
    # REL-020 — preflight on manual dispatch; verify the tag after a release is cut
    needs: release-please
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read       # locate SBOM artifacts for release attachment
      contents: write      # attach assets to the release
      id-token: write      # SLSA provenance signing
      attestations: write  # SLSA provenance storage
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name || github.sha }}
      - run: make setup
      - name: Full test suite (gate)
        run: make test
      - name: Vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Prepare SBOM output
        run: make sbom
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: dist/sbom.spdx.json
          artifact-name: sbom-spdx
          upload-artifact: true
          upload-release-assets: true
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
          artifact-name: sbom-cyclonedx
          upload-artifact: true
          upload-release-assets: true
      - name: Build release artifact
        run: make build
      - name: Attest build provenance (SLSA — SEC-031)
        if: hashFiles('dist/**') != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/**"
      # TEMPLATE: add artifact publishing (registry push, package publish) here;
      # for container images, prefer cosign keyless signing — see docs/deployment/.
