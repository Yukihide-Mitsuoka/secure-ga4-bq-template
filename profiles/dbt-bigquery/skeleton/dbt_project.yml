# GA4 secure-mart skeleton (build rail FR-1). Layer conventions are dbt-standard:
# staging (stg_ga4__*) -> intermediate (int_*) -> marts (fct_*/dim_*), one dataset each,
# matching the datasets Terraform creates in infra/envs/<env>.
name: ga4_secure_marts
version: "0.1.0"
profile: ga4_secure_marts

model-paths: ["models"]
macro-paths: ["macros"]

vars:
  # Engagement parameters (FR-7) — wire from Terraform outputs:
  #   terraform -chdir=infra/envs/dev output -json policy_tag_ids
  policy_tag_high: ""
  policy_tag_medium: ""
  policy_tag_low: ""
  # The Google-created GA4 export (read-only source; locked down by dataset IAM):
  ga4_export_project: ""
  ga4_export_dataset: "" # e.g. analytics_123456789

models:
  ga4_secure_marts:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
